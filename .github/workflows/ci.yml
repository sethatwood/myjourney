name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Forge deployment
        env:
          WEBHOOK: ${{ secrets.FORGE_DEPLOY_WEBHOOK }}
        run: |
          if [ -n "$WEBHOOK" ]; then
            curl -fsS -X POST "$WEBHOOK"
            echo "Forge deployment triggered."
          else
            echo "FORGE_DEPLOY_WEBHOOK secret not set; skipping deploy."
          fi
